{% extends 'base.html' %}

{% block title %}Estadisticas{% endblock %}

{% block css %}
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='styles/estadisticas.css') }}"
    />
{% endblock %}
{% block content %} 

    <div class="contenedor_principal">
        <h2>Actividades por Día</h2>
        <canvas id="graficoLineas"></canvas>

        <h2>Actividades por Tipo</h2>
        <canvas id="graficoTorta"></canvas>

        <h2>Actividades por Mes y Turno</h2>
        <canvas id="graficoBarras"></canvas>
    </div>
{% endblock content %}

{% block javascript %}
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script type="module" src="{{ url_for('static', filename='scripts/estadisticas.js') }}"></script>
        
{% endblock %}
